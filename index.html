<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏の音を電気的にカタチにするアート</title>
    <style>
        :root {
            --bg-color: #050810; 
            --panel-bg: rgba(10, 20, 30, 0.85);
            --accent-color: #00ffff; 
            --text-color: #e0f0f0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #artCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 20px; box-sizing: border-box;
            margin-top: auto; margin-bottom: 10px;
        }

        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 24px;
            padding: 16px; width: 100%; max-width: 440px;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            text-align: center;
        }

        .instruction {
            font-size: 0.8rem; color: #88aaaa; margin-bottom: 12px; line-height: 1.4;
        }

        /* 音を追加するボタンエリア */
        .btn-row {
            display: flex; gap: 10px; width: 100%; margin-bottom: 12px;
        }

        .sound-add-btn {
            flex: 1; background-color: #1a2a3a; border: 2px solid rgba(0,255,255,0.3);
            color: #fff; padding: 12px; border-radius: 20px; font-weight: bold;
            font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
        }
        .sound-add-btn:active { transform: scale(0.95); }
        .sound-add-btn.active {
            background-color: rgba(0,255,255,0.15);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
        }

        .gift-btn {
            width: 100%; background: linear-gradient(135deg, #cc11aa, #ff3344);
            color: white; border: none; padding: 12px; border-radius: 25px;
            font-weight: bold; cursor: pointer; font-size: 0.85rem;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* モーダル */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 8, 16, 0.9);
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: #ffffff; color: #112233; padding: 25px; border-radius: 24px;
            text-align: center; max-width: 400px; width: 100%;
        }
        .modal-content h2 { color: #aa11aa; margin-top: 0; font-size: 1.3rem; }
        .modal-content p { line-height: 1.5; color: #334455; text-align: left; font-size: 0.9rem; white-space: pre-wrap; }
        .close-btn { margin-top: 15px; background-color: #667788; color: white; border: none; padding: 10px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <div class="ui-layer">
        <div class="controls-panel">
            <div class="instruction">下のボタンを押すと夏の音が重なり、<br>画面に電気的なカタチが生まれます。シェイプを触ると変形します。</div>
            
            <div class="btn-row">
                <button id="btn-thunder" class="sound-add-btn">⚡ 雷の音を追加</button>
                <button id="btn-rain" class="sound-add-btn">🌧️ 雨の音を追加</button>
            </div>
            
            <button id="giftBtn" class="gift-btn">お中元を開ける 🎁</button>
        </div>
    </div>

    <div id="giftModal" class="modal">
        <div class="modal-content">
            <h2>御中元 🌸</h2>
            <p>いつも温かいお心遣いをいただき、心より感謝申し上げます。

日頃の感謝を込めまして、ささやかではございますが、涼を感じていただけるお品物をお贈りいたしました。

猛暑の折、体調を崩されませぬよう、どうぞご自愛ください。

（※お品物は別途、宅配便にてお届けいたします！）</p>
            <button id="closeModalBtn" class="close-btn">閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const giftBtn = document.getElementById('giftBtn');
        const giftModal = document.getElementById('giftModal');
        const closeModalBtn = document.getElementById('closeModalBtn');

        let audioCtx = null;
        
        // 音源データの定義（すでにリポジトリにあるファイルを指定）
        const soundInfo = [
            { id: 'thunder', url: 'thunder.mp3', btn: document.getElementById('btn-thunder'), type: 0, buffer: null, sourceNode: null, analyser: null, isPlaying: false, dataArray: null, shape: null },
            { id: 'rain', url: 'rain.mp3', btn: document.getElementById('btn-rain'), type: 1, buffer: null, sourceNode: null, analyser: null, isPlaying: false, dataArray: null, shape: null }
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 電気的なシェイプクラス ---
        class ElectricShape {
            constructor(type) {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.baseSize = 50 + Math.random() * 20;
                this.size = this.baseSize;
                this.color = type === 0 ? 'rgba(0, 255, 255, 0.7)' : 'rgba(255, 0, 255, 0.6)'; // 雷はシアン、雨はマゼンタ
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.type = type; 
                this.points = type === 0 ? 12 : 6;
                this.isTouched = false;
                this.touchTimer = 0;
            }

            checkTouch(tx, ty) {
                const dist = Math.sqrt((tx - this.x)**2 + (ty - this.y)**2);
                if (dist < this.size * 1.3) {
                    this.isTouched = true;
                    this.touchTimer = 1.0; 
                    return true;
                }
                return false;
            }

            update(volume) {
                this.size = this.baseSize + (volume * 160);

                if (this.isTouched) {
                    this.touchTimer -= 0.02;
                    if (this.touchTimer <= 0) this.isTouched = false;
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 50 || this.x > canvas.width - 50) this.vx *= -1;
                if (this.y < 50 || this.y > canvas.height - 50) this.vy *= -1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.lineWidth = this.isTouched ? 4 : 2;
                
                if (this.isTouched) {
                    ctx.fillStyle = this.color.replace('0.', '0.9'); 
                    ctx.strokeStyle = '#ffffff'; 
                    ctx.shadowColor = '#ffffff';
                    ctx.shadowBlur = 25;
                } else {
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = this.color.replace('0.', '1.');
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 12;
                }

                ctx.beginPath();
                if (this.type === 0) {
                    // ⚡ 雷：カクカクした電気パルス
                    for (let i = 0; i < this.points; i++) {
                        const angle = (Math.PI * 2 / this.points) * i;
                        const jolt = (Math.random() - 0.5) * (this.isTouched ? 40 : 15);
                        const r = this.size + jolt;
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                } else {
                    // 🌧️ 雨：タッチで形状の頂点数が変わるデジタルグリッド
                    const p = this.isTouched ? 4 : this.points;
                    for (let i = 0; i < p; i++) {
                        const angle = (Math.PI * 2 / p) * i;
                        ctx.lineTo(Math.cos(angle) * this.size, Math.sin(angle) * this.size);
                    }
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- オーディオ処理 ---
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 音声をインターネット経由（GitHub内）からダウンロードする関数
        function loadSound(sound) {
            return fetch(sound.url)
                .then(response => response.arrayBuffer())
                .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
                .then(buffer => {
                    sound.buffer = buffer;
                    sound.analyser = audioCtx.createAnalyser();
                    sound.analyser.fftSize = 32;
                    sound.dataArray = new Uint8Array(16);
                });
        }

        // ボタンを押した時の切り替え処理
        function toggleSound(sound) {
            initAudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (sound.isPlaying) {
                // 停止処理
                if (sound.sourceNode) sound.sourceNode.stop();
                sound.isPlaying = false;
                sound.btn.classList.remove('active');
                sound.shape = null; // シェイプを消去
            } else {
                // 再生処理
                sound.btn.innerText = "読み込み中...";
                
                const startPlay = () => {
                    sound.sourceNode = audioCtx.createBufferSource();
                    sound.sourceNode.buffer = sound.buffer;
                    sound.sourceNode.connect(sound.analyser);
                    sound.analyser.connect(audioCtx.destination);
                    sound.sourceNode.loop = true;
                    sound.sourceNode.start(0);
                    
                    sound.isPlaying = true;
                    sound.btn.classList.add('active');
                    sound.btn.innerText = sound.id === 'thunder' ? '⚡ 雷の音を消す' : '🌧️ 雨の音を消す';
                    
                    // 新しいシェイプを画面中央に生成
                    sound.shape = new ElectricShape(sound.type);
                };

                if (sound.buffer) {
                    startPlay();
                } else {
                    loadSound(sound).then(startPlay).catch(err => {
                        alert("音の読み込みに失敗しました。時間をおいて再度お試しください。");
                        sound.btn.innerText = sound.id === 'thunder' ? '⚡ 雷の音を追加' : '🌧️ 雨の音を追加';
                    });
                }
            }
        }

        // 各ボタンにイベントを設定
        soundInfo.forEach(sound => {
            sound.btn.addEventListener('click', () => toggleSound(sound));
        });

        // --- メイン描画ループ ---
        function animate() {
            requestAnimationFrame(animate);

            ctx.fillStyle = 'rgba(5, 8, 16, 0.25)'; // 黒い背景（残像あり）
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            soundInfo.forEach(sound => {
                if (sound.isPlaying && sound.shape) {
                    let volume = 0;
                    sound.analyser.getByteFrequencyData(sound.dataArray);
                    let sum = 0;
                    for (let i = 0; i < sound.dataArray.length; i++) sum += sound.dataArray[i];
                    volume = (sum / sound.dataArray.length) / 255;

                    sound.shape.update(volume);
                    sound.shape.draw();
                }
            });
        }
        animate();

        // --- タッチインタラクション ---
        function handleTouch(clientX, clientY) {
            initAudioContext();
            const rect = canvas.getBoundingClientRect();
            const tx = clientX - rect.left;
            const ty = clientY - rect.top;

            soundInfo.forEach(sound => {
                if (sound.shape) sound.shape.checkTouch(tx, ty);
            });
        }

        canvas.addEventListener('mousedown', (e) => handleTouch(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) handleTouch(e.touches[0].clientX, e.touches[0].clientY);
        });

        // --- モーダル処理 ---
        giftBtn.addEventListener('click', () => {
            soundInfo.forEach(sound => {
                if (sound.isPlaying) toggleSound(sound);
            });
            giftModal.style.display = 'flex';
        });

        closeModalBtn.addEventListener('click', () => {
            giftModal.style.display = 'none';
        });
    </script>
</body>
</html>
