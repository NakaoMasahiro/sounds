<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏の音をカタチにする落書きアート</title>
    <style>
        :root {
            --bg-color: #04060f; 
            --panel-bg: rgba(10, 16, 32, 0.92);
            --accent-color: #00ffff; 
            --text-color: #e0f0f0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #artCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #artCanvas:active { cursor: grabbing; }

        .ui-layer {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 20px; box-sizing: border-box;
            margin-top: auto; margin-bottom: 10px;
            pointer-events: none;
        }

        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 255, 255, 0.25);
            border-radius: 24px;
            padding: 16px; width: 100%; max-width: 440px;
            box-sizing: border-box;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
            text-align: center;
            pointer-events: auto;
        }

        .instruction {
            font-size: 0.75rem; color: #88aaaa; margin-bottom: 12px; line-height: 1.4;
        }

        /* オーブ（音の増減管理）エリア */
        .audio-list {
            display: flex; gap: 10px; justify-content: center;
            margin-bottom: 15px; flex-wrap: wrap;
        }

        .orb-container {
            display: flex; align-items: center;
            background-color: #0a1424; border: 2px solid rgba(0,255,255,0.2);
            border-radius: 20px; padding: 2px 4px 2px 10px;
            transition: all 0.2s;
        }
        .orb-container.playing {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
            background-color: rgba(0,255,255,0.05);
        }

        .audio-num {
            color: #888; font-weight: bold; cursor: pointer;
            font-size: 0.85rem; padding-right: 6px;
        }
        .orb-container.playing .audio-num { color: #fff; }

        .delete-btn {
            background: rgba(255,0,50,0.15); border: 1px solid rgba(255,0,50,0.4);
            color: #ff4466; border-radius: 12px; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; cursor: pointer; font-weight: bold; transition: all 0.1s;
        }
        .delete-btn:hover { background: rgba(255,0,50,0.4); color: #fff; }

        .upload-label {
            width: 100%; background-color: #0b2e52; border: 1px solid rgba(0,255,255,0.4);
            color: white; padding: 11px; border-radius: 20px; font-weight: bold;
            font-size: 0.85rem; cursor: pointer; display: block; margin-bottom: 12px;
            box-sizing: border-box; transition: background 0.2s;
        }
        
        #audioFile { display: none; }

        .gift-btn {
            width: 100%; background: linear-gradient(135deg, #aa0a88, #dd2233);
            color: white; border: none; padding: 11px; border-radius: 25px;
            font-weight: bold; cursor: pointer; font-size: 0.85rem;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* モーダル */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.94);
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: #ffffff; color: #111827; padding: 25px; border-radius: 24px;
            text-align: center; max-width: 400px; width: 100%;
        }
        .modal-content h2 { color: #aa0a88; margin-top: 0; font-size: 1.25rem; }
        .modal-content p { line-height: 1.5; color: #374151; text-align: left; font-size: 0.85rem; white-space: pre-wrap; }
        .close-btn { margin-top: 15px; background-color: #4b5563; color: white; border: none; padding: 10px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <div class="ui-layer">
        <div class="controls-panel">
            <div class="instruction">【音声をアップロード】すると、完全にランダムな落書きが出現。<br>数字をタップで再生/消音、[✕]でその音と形を減らせます。</div>
            
            <div class="audio-list" id="audioList"></div>

            <label for="audioFile" class="upload-label">🎵 スマホの音・録音をアップロード</label>
            <input type="file" id="audioFile" accept="audio/*">
            
            <button id="giftBtn" class="gift-btn">お中元を開ける 🎁</button>
        </div>
    </div>

    <div id="giftModal" class="modal">
        <div class="modal-content">
            <h2>御中元 🌸</h2>
            <p>いつも温かいお心遣いをいただき、心より感謝申し上げます。

日頃の感謝を込めまして、ささやかではございますが、涼を感じていただけるお品物をお贈りいたしました。

猛暑の折、体調を崩されませぬよう、どうぞご自愛ください。

（※お品物は別途, 宅配便にてお届けいたします！）</p>
            <button id="closeModalBtn" class="close-btn">閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const audioFileInput = document.getElementById('audioFile');
        const audioListContainer = document.getElementById('audioList');
        const giftBtn = document.getElementById('giftBtn');
        const giftModal = document.getElementById('giftModal');
        const closeModalBtn = document.getElementById('closeModalBtn');

        let audioCtx = null;
        let sounds = []; // 読み込まれた音のデータ配列
        let draggedShape = null; 
        let uniqueIdCounter = 0; // 削除時に特定するためのID

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 手描きの落書き（Doodle）風シェイプクラス ---
        class ScribbleShape {
            constructor(id, index) {
                this.id = id;
                this.x = Math.random() * (canvas.width - 200) + 100;
                this.y = Math.random() * (canvas.height - 300) + 100;
                this.targetX = this.x;
                this.targetY = this.y;
                this.isDragging = false;

                this.baseSize = 45 + Math.random() * 25;
                this.size = this.baseSize;
                
                // ネオン落書きカラー
                const colors = [
                    'rgba(0, 255, 255, ',   // シアン
                    'rgba(255, 20, 147, ',  // 蛍光ピンク
                    'rgba(50, 255, 50, ',   // ネオングリーン
                    'rgba(255, 255, 0, ',   // ひまわりイエロー
                    'rgba(255, 127, 0, '    // サイバーオレンジ
                ];
                this.colorBase = colors[index % colors.length];
                
                this.vx = (Math.random() - 0.5) * 1.4;
                this.vy = (Math.random() - 0.5) * 1.4;
                
                this.points = 14 + Math.floor(Math.random() * 8); // 頂点数をバラバラに
                this.rotAngle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.008;

                // 【元からランダムな形状にするため、初期の歪み（シワ）の癖を記憶】
                this.shapeQuirks = Array(this.points).fill().map(() => 0.5 + Math.random() * 0.8);
                // ブルブル震える動的ノイズ用
                this.noiseSeeds = Array(this.points).fill().map(() => Math.random() * 100);
            }

            isHit(tx, ty) {
                const dist = Math.sqrt((tx - this.x)**2 + (ty - this.y)**2);
                return dist < this.size * 1.4;
            }

            update(volume) {
                if (this.isDragging) {
                    this.x += (this.targetX - this.x) * 0.25;
                    this.y += (this.targetY - this.y) * 0.25;
                    this.vx = (Math.random() - 0.5) * 1.4;
                    this.vy = (Math.random() - 0.5) * 1.4;
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 80 || this.x > canvas.width - 80) this.vx *= -1;
                    if (this.y < 80 || this.y > canvas.height - 80) this.vy *= -1;
                }

                // 音量で基本サイズがブワッと大きくなる
                this.size = this.baseSize + (volume * 170);
                this.rotAngle += this.rotSpeed + (volume * 0.02);

                // 震えるスピードも音量に合わせて加速
                for (let i = 0; i < this.points; i++) {
                    this.noiseSeeds[i] += 0.05 + (volume * 0.2);
                }
            }

            draw(volume) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotAngle);
                
                // 落書き感を出すために、あえて少し歪んだ線を3重に重ねる
                const lineLayers = 3;
                
                for (let l = 0; l < lineLayers; l++) {
                    const layerScale = 0.5 + (l * 0.3);
                    ctx.lineWidth = this.isDragging ? 3.5 - (l * 0.6) : 2.2 - (l * 0.5);
                    
                    const alpha = this.isDragging ? (1.0 - l * 0.2) : (0.45 + volume * 0.55 - (l * 0.1));
                    ctx.strokeStyle = this.colorBase + alpha + ')';
                    
                    ctx.shadowColor = this.colorBase + '0.7)';
                    ctx.shadowBlur = this.isDragging ? 18 : 6;

                    ctx.beginPath();
                    for (let i = 0; i < this.points; i++) {
                        const angle = (Math.PI * 2 / this.points) * i;
                        
                        // 1. 最初から持っている固有のいびつさ（手描き癖）
                        const quirk = this.shapeQuirks[i];
                        
                        // 2. 音に反応してブルブル震える落書きの「震えノイズ」
                        const jitter = Math.sin(this.noiseSeeds[i]) * (this.size * 0.12 * (volume + 0.1));
                        
                        // これらを掛け合わせてリアルな手描きの震えを再現
                        const r = (this.size * layerScale * quirk) + jitter;
                        
                        const px = Math.cos(angle) * r;
                        const py = Math.sin(angle) * r;
                        
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        // --- オーディオコア＆UI操作 ---
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        audioFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            initAudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const id = uniqueIdCounter++;
            const fileURL = URL.createObjectURL(file);
            const audioEl = new Audio(fileURL);
            audioEl.loop = true;
            audioEl.crossOrigin = "anonymous";

            const sourceNode = audioCtx.createMediaElementSource(audioEl);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 32;
            
            sourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            // 最初からランダムな手描き形状を生成
            const newShape = new ScribbleShape(id, sounds.length);

            // --- 新しいUI：増減可能な「削除ボタン付きオーブ」の作成 ---
            const container = document.createElement('div');
            container.className = 'orb-container';
            container.id = `orb-cont-${id}`;

            const numSpan = document.createElement('span');
            numSpan.className = 'audio-num';
            numSpan.innerText = `音 ${sounds.length + 1}`;
            
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.innerText = '✕';

            container.appendChild(numSpan);
            container.appendChild(delBtn);
            audioListContainer.appendChild(container);

            const soundData = {
                id: id,
                audioEl: audioEl,
                analyser: analyser,
                dataArray: new Uint8Array(16),
                shape: newShape,
                isPlaying: false,
                contEl: container
            };
            sounds.push(soundData);

            // 再生・消音の切り替え
            numSpan.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (soundData.isPlaying) {
                    audioEl.pause();
                    container.classList.remove('playing');
                    soundData.isPlaying = false;
                } else {
                    audioEl.play().catch(err => console.log(err));
                    container.classList.add('playing');
                    soundData.isPlaying = true;
                }
            });

            // ✕ボタンで音と形を「減らす」処理
            delBtn.addEventListener('click', () => {
                // 音を止めて接続を解除
                audioEl.pause();
                sourceNode.disconnect();
                analyser.disconnect();
                
                // 画面のUI要素を削除
                container.remove();
                
                // 配列（sounds）からこのデータを完全に削除
                sounds = sounds.filter(s => s.id !== id);
                
                // 残った音の表示番号を綺麗にリネーム（音1, 音2...）
                document.querySelectorAll('.audio-num').forEach((el, idx) => {
                    el.innerText = `音 ${idx + 1}`;
                });
            });

            // 自動再生スタート
            audioEl.play().catch(err => console.log(err));
            container.classList.add('playing');
            soundData.isPlaying = true;
            
            audioFileInput.value = ''; // リセット
        });

        // --- メイン描画ループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 残像を残して落書きの軌跡をきれいに見せる
            ctx.fillStyle = 'rgba(4, 6, 15, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            sounds.forEach(sound => {
                let volume = 0;
                if (sound.isPlaying) {
                    sound.analyser.getByteFrequencyData(sound.dataArray);
                    let sum = 0;
                    for (let i = 0; i < sound.dataArray.length; i++) sum += sound.dataArray[i];
                    volume = (sum / sound.dataArray.length) / 255;
                }

                sound.shape.update(volume);
                sound.shape.draw(volume);
            });
        }
        animate();

        // --- マウス / タッチによるドラッグ操作 ---
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function handleStart(e) {
            initAudioContext();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            const pos = getMousePos(e);
            
            for (let i = sounds.length - 1; i >= 0; i--) {
                const shape = sounds[i].shape;
                if (shape.isHit(pos.x, pos.y)) {
                    draggedShape = shape;
                    shape.isDragging = true;
                    shape.targetX = pos.x;
                    shape.targetY = pos.y;
                    break;
                }
            }
        }

        function handleMove(e) {
            if (!draggedShape) return;
            if (e.cancelable) e.preventDefault(); 
            const pos = getMousePos(e);
            draggedShape.targetX = pos.x;
            draggedShape.targetY = pos.y;
        }

        function handleEnd() {
            if (draggedShape) {
                draggedShape.isDragging = false;
                draggedShape = null;
            }
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // --- モーダル（お中元）操作 ---
        giftBtn.addEventListener('click', () => {
            // すべての音を一時停止
            sounds.forEach(sound => {
                sound.audioEl.pause();
                sound.contEl.classList.remove('playing');
                sound.isPlaying = false;
            });
            giftModal.style.display = 'flex';
        });

        closeModalBtn.addEventListener('click', () => {
            giftModal.style.display = 'none';
        });
    </script>
</body>
</html>
