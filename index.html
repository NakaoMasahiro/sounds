<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏の音を電気的にカタチにするアート</title>
    <style>
        :root {
            --bg-color: #050810; /* 深い闇 */
            --panel-bg: rgba(10, 20, 30, 0.85);
            --accent-color: #00ffff; /* シアン（電気） */
            --text-color: #e0f0f0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* アート描画キャンバス */
        #artCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* UIコンテナ */
        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            margin-top: auto; 
            margin-bottom: 10px;
        }

        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 24px;
            padding: 12px 16px;
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        /* 音声コントロール（複数表示） */
        .audio-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding: 4px 0;
            scrollbar-width: thin;
        }
        .audio-list::-webkit-scrollbar { height: 4px; }
        .audio-list::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 2px; }

        .audio-orb {
            flex: 0 0 50px;
            height: 50px;
            border-radius: 25px;
            background-color: #1a2a3a;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .audio-orb:active { transform: scale(0.95); }
        .audio-orb.playing {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            color: #fff;
        }
        .audio-orb.add-new {
            background-color: rgba(0,255,255,0.1);
            border: 2px dashed rgba(0,255,255,0.4);
            color: var(--accent-color);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn {
            flex: 1;
            background-color: #223344;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        #audioFile { display: none; }

        .gift-btn {
            background: linear-gradient(135deg, #cc11aa, #ff3344);
            color: white;
            animation: pulse 3s infinite;
            padding: 10px 12px;
            font-size: 0.8rem;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 8, 16, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: #ffffff;
            color: #112233;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .modal-content h2 {
            color: #aa11aa;
            margin-top: 0;
            font-size: 1.3rem;
        }
        .modal-content p {
            line-height: 1.5;
            color: #334455;
            text-align: left;
            font-size: 0.9rem;
        }
        .close-btn {
            margin-top: 15px;
            background-color: #667788;
            width: 100%;
        }
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <div class="ui-layer">
        <div class="controls-panel">
            <div class="audio-list" id="audioList">
                <label for="audioFile" class="audio-orb add-new">＋</label>
                <input type="file" id="audioFile" accept="audio/*">
            </div>
            
            <button id="giftBtn" class="btn gift-btn">お中元を開ける 🎁</button>
        </div>
    </div>

    <div id="giftModal" class="modal">
        <div class="modal-content">
            <h2>御中元 🌸</h2>
            <p>いつも温かいお心遣いをいただき、心より感謝申し上げます。

日頃の感謝を込めまして、ささやかではございますが、涼を感じていただけるお品物をお贈りいたしました。

猛暑の折、体調を崩されませぬよう、どうぞご自愛ください。

（※お品物は別途、宅配便にてお届けいたします！）</p>
            <button id="closeModalBtn" class="btn close-btn">閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const audioFileInput = document.getElementById('audioFile');
        const audioListEl = document.getElementById('audioList');
        const giftBtn = document.getElementById('giftBtn');
        const giftModal = document.getElementById('giftModal');
        const closeModalBtn = document.getElementById('closeModalBtn');

        let audioCtx = null;
        const sounds = []; // 複数の音（{sourceNode, analyser, buffer, shape, isPlaying}）を管理

        // 画面サイズにキャンバスを合わせる
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 電気的なシェイプクラス ---
        class ElectricShape {
            constructor(sourceIndex) {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.baseSize = 40 + Math.random() * 20;
                this.size = this.baseSize;
                this.color = this.getRandomElectricColor();
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                // sourceIndexによって形状パターンを変える (0:稲妻, 1:パルス)
                this.type = sourceIndex % 2; 
                this.points = this.type === 0 ? 10 : 16; // 稲妻はカクカク、パルスは多角
                
                this.isTouched = false; // タッチされているか
                this.touchTimer = 0; // タッチ時の変化用タイマー
            }

            getRandomElectricColor() {
                const colors = [
                    'rgba(0, 255, 255, 0.7)',  // シアン（電気）
                    'rgba(120, 255, 0, 0.6)',  // ライム
                    'rgba(255, 0, 255, 0.6)',  // マゼンタ
                    'rgba(0, 100, 255, 0.7)'   // ディープブルー
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            // クリック判定
            checkTouch(tx, ty) {
                const dist = Math.sqrt((tx - this.x)**2 + (ty - this.y)**2);
                if (dist < this.size * 1.5) {
                    this.isTouched = true;
                    this.touchTimer = 1.0; // 1秒間変化
                    return true;
                }
                return false;
            }

            update(volume) {
                // 音量(volume: 0〜1)に応じてサイズを大きく躍動させる
                this.size = this.baseSize + (volume * 150);

                // タッチ時の変化（タイマーを減らす）
                if (this.isTouched) {
                    this.touchTimer -= 0.02;
                    if (this.touchTimer <= 0) {
                        this.isTouched = false;
                        this.touchTimer = 0;
                    }
                }

                // 移動
                this.x += this.vx;
                this.y += this.vy;

                // 画面外で跳ね返る
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.lineWidth = this.isTouched ? 4 : 2;
                
                // タッチ時は色がより白く、明るくなる
                if (this.isTouched) {
                    ctx.fillStyle = this.color.replace('0.', '0.9').replace(')', ', 0.3)'); 
                    ctx.strokeStyle = '#ffffff'; 
                    // グロー効果（発光）
                    ctx.shadowColor = '#ffffff';
                    ctx.shadowBlur = 20;
                } else {
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = this.color.replace('0.', '1.'); // 枠線は不透明に
                    ctx.shadowColor = this.color.replace('0.', '0.9');
                    ctx.shadowBlur = 10;
                }

                ctx.beginPath();
                if (this.type === 0) {
                    // Pattern 1: ⚡ 稲妻パルス (カクカクした電気)
                    for (let i = 0; i < this.points; i++) {
                        const angle = (Math.PI * 2 / this.points) * i;
                        // タッチ時は形がより鋭角に変化
                        const jolt = (Math.random() - 0.5) * (this.isTouched ? 30 : 15);
                        const r = this.size + jolt;
                        const x = Math.cos(angle) * r;
                        const y = Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                } else {
                    // Pattern 2: 🌐 デジタルグリッド (多角形で構成された電気)
                    const points = this.isTouched ? 5 : this.points; // タッチ時は形がシンプルに
                    for (let i = 0; i < points; i++) {
                        const angle = (Math.PI * 2 / points) * i;
                        const r = this.size;
                        const x = Math.cos(angle) * r;
                        const y = Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- オーディオとUI処理 ---

        // 初期化（初回タッチ時のみ）
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 音声ファイル読み込み
        audioFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            initAudioContext();

            const orbId = `sound-${sounds.length}`;
            
            // 下部のリストに新しいオーブ（音のボタン）を追加
            const orbLabel = document.createElement('div');
            orbLabel.className = 'audio-orb';
            orbLabel.id = orbId;
            orbLabel.innerText = sounds.length + 1; // 1, 2, 3...
            // 新規追加ボタンの前に挿入
            audioListEl.insertBefore(orbLabel, audioFileInput.parentElement);

            const reader = new FileReader();
            reader.onload = function(event) {
                audioCtx.decodeAudioData(event.target.result, function(buffer) {
                    // 音とシェイプをセットにして保存
                    const soundIdx = sounds.length;
                    const soundData = {
                        buffer: buffer,
                        isPlaying: false,
                        shape: new ElectricShape(soundIdx), // 電気シェイプ
                        orbEl: orbLabel,
                        analyser: audioCtx.createAnalyser(),
                        dataArray: new Uint8Array(16) // 解析用
                    };
                    soundData.analyser.fftSize = 32; // 軽量解析
                    sounds.push(soundData);

                    // オーブをクリックしたら再生/停止
                    orbLabel.addEventListener('click', () => toggleSound(soundIdx));

                    console.log(`音 ${soundIdx+1} の準備完了！`);
                    sounds.forEach(s => s.shape.x = canvas.width / 2); // 画面中央に集める
                }, function(err) {
                    alert('音声の解析に失敗しました。他のファイルを試してください。');
                });
            };
            reader.readAsArrayBuffer(file);
        });

        function toggleSound(idx) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const sound = sounds[idx];

            if (sound.isPlaying) {
                // 停止
                sound.sourceNode.stop();
                sound.sourceNode.disconnect();
                sound.orbEl.classList.remove('playing');
                sound.isPlaying = false;
            } else {
                // 再生
                sound.sourceNode = audioCtx.createBufferSource();
                sound.sourceNode.buffer = sound.buffer;
                sound.sourceNode.connect(sound.analyser);
                sound.analyser.connect(audioCtx.destination);
                sound.sourceNode.loop = true; // ループ
                sound.sourceNode.start(0);
                sound.orbEl.classList.add('playing');
                sound.isPlaying = true;
            }
        }

        // --- メインループ（描画） ---
        function animate() {
            requestAnimationFrame(animate);

            // 残像クリア（電気の軌跡を作る）
            ctx.fillStyle = 'rgba(5, 8, 16, 0.2)'; // 濃い闇
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 各音の音量を解析してシェイプを更新・描画
            sounds.forEach(sound => {
                let volume = 0;
                if (sound.isPlaying) {
                    sound.analyser.getByteFrequencyData(sound.dataArray);
                    // 平均音量を計算 (0〜1に正規化)
                    let sum = 0;
                    for (let i = 0; i < sound.dataArray.length; i++) {
                        sum += sound.dataArray[i];
                    }
                    volume = (sum / sound.dataArray.length) / 255;
                }

                sound.shape.update(volume);
                sound.shape.draw();
            });
        }
        
        // アニメーションループ開始
        animate();

        // --- 画面タッチのインタラクション ---
        canvas.addEventListener('mousedown', handleTouchStart);
        canvas.addEventListener('touchstart', (e) => {
            handleTouchStart(e.touches[0]); // 指が複数の場合も1つ目だけ
        });

        function handleTouchStart(e) {
            initAudioContext();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            // タッチ座標
            const rect = canvas.getBoundingClientRect();
            const tx = e.clientX - rect.left;
            const ty = e.clientY - rect.top;

            // 各シェイプをタッチしたか判定
            sounds.forEach(sound => {
                sound.shape.checkTouch(tx, ty);
            });
        }

        // --- モーダル操作 ---
        giftBtn.addEventListener('click', () => {
            // すべての音を止める
            sounds.forEach((sound, idx) => {
                if (sound.isPlaying) toggleSound(idx);
            });
            giftModal.style.display = 'flex';
        });

        closeModalBtn.addEventListener('click', () => {
            giftModal.style.display = 'none';
        });
    </script>
</body>
</html>
