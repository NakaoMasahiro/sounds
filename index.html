<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏の音を電気的にカタチにするアート</title>
    <style>
        :root {
            --bg-color: #050810; 
            --panel-bg: rgba(10, 20, 30, 0.85);
            --accent-color: #00ffff; 
            --text-color: #e0f0f0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #artCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 20px; box-sizing: border-box;
            margin-top: auto; margin-bottom: 10px;
        }

        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 24px;
            padding: 16px; width: 100%; max-width: 440px;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            text-align: center;
        }

        .instruction {
            font-size: 0.8rem; color: #88aaaa; margin-bottom: 12px; line-height: 1.4;
        }

        /* オーブ（音の塊）が並ぶエリア */
        .audio-list {
            display: flex; gap: 10px; justify-content: center;
            margin-bottom: 15px; flex-wrap: wrap;
        }

        .audio-orb {
            width: 50px; height: 50px; border-radius: 25px;
            background-color: #1a2a3a; border: 2px solid rgba(0,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; cursor: pointer; transition: all 0.2s;
            font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .audio-orb.playing {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            background-color: rgba(0,255,255,0.1);
        }

        .upload-label {
            width: 100%; background-color: #115588; border: 1px solid var(--accent-color);
            color: white; padding: 12px; border-radius: 20px; font-weight: bold;
            font-size: 0.9rem; cursor: pointer; display: block; margin-bottom: 12px;
            box-sizing: border-box; transition: background 0.2s;
        }
        .upload-label:active { transform: scale(0.98); }
        
        #audioFile { display: none; }

        .gift-btn {
            width: 100%; background: linear-gradient(135deg, #cc11aa, #ff3344);
            color: white; border: none; padding: 12px; border-radius: 25px;
            font-weight: bold; cursor: pointer; font-size: 0.85rem;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* モーダル */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 8, 16, 0.9);
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: #ffffff; color: #112233; padding: 25px; border-radius: 24px;
            text-align: center; max-width: 400px; width: 100%;
        }
        .modal-content h2 { color: #aa11aa; margin-top: 0; font-size: 1.3rem; }
        .modal-content p { line-height: 1.5; color: #334455; text-align: left; font-size: 0.9rem; white-space: pre-wrap; }
        .close-btn { margin-top: 15px; background-color: #667788; color: white; border: none; padding: 10px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <div class="ui-layer">
        <div class="controls-panel">
            <div class="instruction">【音声をアップロード】すると、画面にカタチが生まれます。<br>複数の音を重ねることができ、形を触ると変形します。</div>
            
            <div class="audio-list" id="audioList"></div>

            <label for="audioFile" class="upload-label">🎵 スマホの音・録音をアップロード</label>
            <input type="file" id="audioFile" accept="audio/*">
            
            <button id="giftBtn" class="gift-btn">お中元を開ける 🎁</button>
        </div>
    </div>

    <div id="giftModal" class="modal">
        <div class="modal-content">
            <h2>御中元 🌸</h2>
            <p>いつも温かいお心遣いをいただき、心より感謝申し上げます。

日頃の感謝を込めまして、ささやかではございますが、涼を感じていただけるお品物をお贈りいたしました。

猛暑の折、体調を崩されませぬよう、どうぞご自愛ください。

（※お品物は別途, 宅配便にてお届けいたします！）</p>
            <button id="closeModalBtn" class="close-btn">閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const audioFileInput = document.getElementById('audioFile');
        const audioListContainer = document.getElementById('audioList');
        const giftBtn = document.getElementById('giftBtn');
        const giftModal = document.getElementById('giftModal');
        const closeModalBtn = document.getElementById('closeModalBtn');

        let audioCtx = null;
        const sounds = []; // 読み込まれた音のリスト

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 電気的なシェイプクラス ---
        class ElectricShape {
            constructor(type) {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.baseSize = 40 + Math.random() * 20;
                this.size = this.baseSize;
                // 追加されるごとにランダムでサイケデリックな電気色にする
                const hues = [180, 280, 60, 330]; 
                const selectedHue = hues[type % hues.length];
                this.color = `rgba(${selectedHue === 180 ? '0,255,255' : selectedHue === 280 ? '150,50,255' : selectedHue === 60 ? '200,255,0' : '255,0,150'}, 0.65)`;
                
                this.vx = (Math.random() - 0.5) * 2.5;
                this.vy = (Math.random() - 0.5) * 2.5;
                this.type = type % 2; 
                this.points = this.type === 0 ? 12 : 6;
                this.isTouched = false;
                this.touchTimer = 0;
            }

            checkTouch(tx, ty) {
                const dist = Math.sqrt((tx - this.x)**2 + (ty - this.y)**2);
                if (dist < this.size * 1.3) {
                    this.isTouched = true;
                    this.touchTimer = 1.0; 
                    return true;
                }
                return false;
            }

            update(volume) {
                this.size = this.baseSize + (volume * 180);

                if (this.isTouched) {
                    this.touchTimer -= 0.02;
                    if (this.touchTimer <= 0) this.isTouched = false;
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 40 || this.x > canvas.width - 40) this.vx *= -1;
                if (this.y < 40 || this.y > canvas.height - 40) this.vy *= -1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.lineWidth = this.isTouched ? 4 : 2;
                
                if (this.isTouched) {
                    ctx.fillStyle = this.color.replace('0.65', '0.9'); 
                    ctx.strokeStyle = '#ffffff'; 
                    ctx.shadowColor = '#ffffff';
                    ctx.shadowBlur = 25;
                } else {
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = this.color.replace('0.65', '1');
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 12;
                }

                ctx.beginPath();
                if (this.type === 0) {
                    // ⚡ カクカクパルス
                    for (let i = 0; i < this.points; i++) {
                        const angle = (Math.PI * 2 / this.points) * i;
                        const jolt = (Math.random() - 0.5) * (this.isTouched ? 40 : 15);
                        const r = this.size + jolt;
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                } else {
                    // 🌐 デジタルグリッド
                    const p = this.isTouched ? 4 : this.points;
                    for (let i = 0; i < p; i++) {
                        const angle = (Math.PI * 2 / p) * i;
                        ctx.lineTo(Math.cos(angle) * this.size, Math.sin(angle) * this.size);
                    }
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- オーディオ処理 ---
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // ファイルが選択された時の処理（セキュリティ制限対応版）
        audioFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            initAudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // セキュリティ制限を回避するため、Blob URL（仮想URL）を生成
            const fileURL = URL.createObjectURL(file);
            
            // 仮想オーディオ要素を生成
            const audioEl = new Audio(fileURL);
            audioEl.loop = true;
            audioEl.crossOrigin = "anonymous";

            // Web Audio APIのノードを作成
            const sourceNode = audioCtx.createMediaElementSource(audioEl);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 32;
            
            sourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            // 新しいシェイプを生成
            const index = sounds.length;
            const newShape = new ElectricShape(index);

            // 画面に「音のオーブ（ボタン）」を追加
            const orb = document.createElement('div');
            orb.className = 'audio-orb';
            orb.innerText = index + 1;
            audioListContainer.appendChild(orb);

            // データを保持
            const soundData = {
                audioEl: audioEl,
                analyser: analyser,
                dataArray: new Uint8Array(16),
                shape: newShape,
                isPlaying: false,
                orbEl: orb
            };
            sounds.push(soundData);

            // オーブをクリックして再生/停止を切り替え
            orb.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                if (soundData.isPlaying) {
                    audioEl.pause();
                    orb.classList.remove('playing');
                    soundData.isPlaying = false;
                } else {
                    audioEl.play().catch(err => console.log("Play error: ", err));
                    orb.classList.add('playing');
                    soundData.isPlaying = true;
                }
            });

            // 追加したら自動的に再生をONにする
            audioEl.play().catch(err => console.log("Auto-play blocked, click the orb."));
            orb.classList.add('playing');
            soundData.isPlaying = true;
            
            // 入力欄をクリア（同じファイルを連続で選べるように）
            audioFileInput.value = '';
        });

        // --- メイン描画ループ ---
        function animate() {
            requestAnimationFrame(animate);

            ctx.fillStyle = 'rgba(5, 8, 16, 0.25)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            sounds.forEach(sound => {
                let volume = 0;
                if (sound.isPlaying) {
                    sound.analyser.getByteFrequencyData(sound.dataArray);
                    let sum = 0;
                    for (let i = 0; i < sound.dataArray.length; i++) sum += sound.dataArray[i];
                    volume = (sum / sound.dataArray.length) / 255;
                }

                // 音が鳴っていなくても、登録されていればシェイプは存在して動き続ける
                sound.shape.update(volume);
                sound.shape.draw();
            });
        }
        animate();

        // --- タッチインタラクション ---
        function handleTouch(clientX, clientY) {
            initAudioContext();
            const rect = canvas.getBoundingClientRect();
            const tx = clientX - rect.left;
            const ty = clientY - rect.top;

            sounds.forEach(sound => {
                sound.shape.checkTouch(tx, ty);
            });
        }

        canvas.addEventListener('mousedown', (e) => handleTouch(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) handleTouch(e.touches[0].clientX, e.touches[0].clientY);
        });

        // --- モーダル処理 ---
        giftBtn.addEventListener('click', () => {
            // すべての音を一時停止
            sounds.forEach(sound => {
                sound.audioEl.pause();
                sound.orbEl.classList.remove('playing');
                sound.isPlaying = false;
            });
            giftModal.style.display = 'flex';
        });

        closeModalBtn.addEventListener('click', () => {
            giftModal.style.display = 'none';
        });
    </script>
</body>
</html>
