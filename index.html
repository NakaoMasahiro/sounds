<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏の音を電気的にカタチにするアート</title>
    <style>
        :root {
            --bg-color: #03050a; 
            --panel-bg: rgba(8, 12, 24, 0.9);
            --accent-color: #00ffff; 
            --text-color: #e0f0f0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #artCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #artCanvas:active { cursor: grabbing; }

        .ui-layer {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 20px; box-sizing: border-box;
            margin-top: auto; margin-bottom: 10px;
            pointer-events: none; /* 下のパネル以外はタッチを通す */
        }

        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 24px;
            padding: 16px; width: 100%; max-width: 440px;
            box-sizing: border-box;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.08);
            text-align: center;
            pointer-events: auto; /* パネル内はクリックできるように */
        }

        .instruction {
            font-size: 0.75rem; color: #88aaaa; margin-bottom: 12px; line-height: 1.4;
        }

        .audio-list {
            display: flex; gap: 10px; justify-content: center;
            margin-bottom: 15px; flex-wrap: wrap;
        }

        .audio-orb {
            width: 46px; height: 46px; border-radius: 23px;
            background-color: #0d1622; border: 2px solid rgba(0,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            color: #888; font-weight: bold; cursor: pointer; transition: all 0.2s;
            font-size: 0.85rem;
        }
        .audio-orb.playing {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            color: #fff;
            background-color: rgba(0,255,255,0.1);
        }

        .upload-label {
            width: 100%; background-color: #0a355c; border: 1px solid rgba(0,255,255,0.4);
            color: white; padding: 11px; border-radius: 20px; font-weight: bold;
            font-size: 0.85rem; cursor: pointer; display: block; margin-bottom: 12px;
            box-sizing: border-box; transition: background 0.2s;
        }
        
        #audioFile { display: none; }

        .gift-btn {
            width: 100%; background: linear-gradient(135deg, #aa0a88, #dd2233);
            color: white; border: none; padding: 11px; border-radius: 25px;
            font-weight: bold; cursor: pointer; font-size: 0.85rem;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* モーダル */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.92);
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: #ffffff; color: #111827; padding: 25px; border-radius: 24px;
            text-align: center; max-width: 400px; width: 100%;
        }
        .modal-content h2 { color: #aa0a88; margin-top: 0; font-size: 1.25rem; }
        .modal-content p { line-height: 1.5; color: #374151; text-align: left; font-size: 0.85rem; white-space: pre-wrap; }
        .close-btn { margin-top: 15px; background-color: #4b5563; color: white; border: none; padding: 10px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <div class="ui-layer">
        <div class="controls-panel">
            <div class="instruction">【音声をアップロード】すると、音を可視化する線のシェイプが出現。<br>シェイプをドラッグ・スワイプして画面上で動かせます。</div>
            
            <div class="audio-list" id="audioList"></div>

            <label for="audioFile" class="upload-label">🎵 スマホの音・録音をアップロード</label>
            <input type="file" id="audioFile" accept="audio/*">
            
            <button id="giftBtn" class="gift-btn">お中元を開ける 🎁</button>
        </div>
    </div>

    <div id="giftModal" class="modal">
        <div class="modal-content">
            <h2>御中元 🌸</h2>
            <p>いつも温かいお心遣いをいただき、心より感謝申し上げます。

日頃の感謝を込めまして、ささやかではございますが、涼を感じていただけるお品物をお贈りいたしました。

猛暑の折、体調を崩されませぬよう、どうぞご自愛ください。

（※お品物は別途, 宅配便にてお届けいたします！）</p>
            <button id="closeModalBtn" class="close-btn">閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const audioFileInput = document.getElementById('audioFile');
        const audioListContainer = document.getElementById('audioList');
        const giftBtn = document.getElementById('giftBtn');
        const giftModal = document.getElementById('giftModal');
        const closeModalBtn = document.getElementById('closeModalBtn');

        let audioCtx = null;
        const sounds = []; 
        let draggedShape = null; // 現在ドラッグ中のシェイプ

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 音を想像させる「線の重なり」シェイプクラス ---
        class AudioWireframeShape {
            constructor(index) {
                this.x = Math.random() * (canvas.width - 200) + 100;
                this.y = Math.random() * (canvas.height - 300) + 100;
                this.targetX = this.x; // ドラッグ追従用
                this.targetY = this.y;
                this.isDragging = false;

                this.baseSize = 50 + Math.random() * 20;
                this.size = this.baseSize;
                
                // サイバー・エレクトロニックな発光色
                const colors = [
                    'rgba(0, 255, 255, ',   // シアンブルー
                    'rgba(255, 0, 150, ',   // ネオンピンク
                    'rgba(0, 255, 120, ',   // ネオングリーン
                    'rgba(255, 180, 0, '    // サイバーオレンジ
                ];
                this.colorBase = colors[index % colors.length];
                
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                
                this.points = 16; // 形状の複雑さ（波形の細かさ）
                this.noiseOffsets = Array(this.points).fill().map(() => Math.random() * Math.PI * 2);
                this.rotAngle = Math.random() * Math.PI;
                this.rotSpeed = (Math.random() - 0.5) * 0.01;
            }

            // タッチがシェイプの範囲内にあるか判定
            isHit(tx, ty) {
                const dist = Math.sqrt((tx - this.x)**2 + (ty - this.y)**2);
                return dist < this.size * 1.5;
            }

            update(volume) {
                // ドラッグ中なら指・カーソルの位置へ滑らかに追従(イージング)
                if (this.isDragging) {
                    this.x += (this.targetX - this.x) * 0.25;
                    this.y += (this.targetY - this.y) * 0.25;
                    this.vx = (Math.random() - 0.5) * 1.5; // 離した時のために速度を再計算
                    this.vy = (Math.random() - 0.5) * 1.5;
                } else {
                    // 通常時はフワフワ自動移動
                    this.x += this.vx;
                    this.y += this.vy;

                    // 画面端で滑らかに跳ね返る
                    if (this.x < 80 || this.x > canvas.width - 80) this.vx *= -1;
                    if (this.y < 80 || this.y > canvas.height - 80) this.vy *= -1;
                }

                // 基本サイズに音量を増幅して反映
                this.size = this.baseSize + (volume * 180);
                this.rotAngle += this.rotSpeed + (volume * 0.05); // 音が大きくなると回転が速くなる

                // 形状のランダムなうねり（音のノイズを表現）のオフセット更新
                for (let i = 0; i < this.points; i++) {
                    this.noiseOffsets[i] += 0.02 + (volume * 0.1);
                }
            }

            draw(volume) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotAngle);
                ctx.fill() || (ctx.fillStyle = 'transparent'); // 塗りつぶしはなし

                // 線の「3重の重ね合わせ」によりエレクトロニックな深度を演出
                const layers = this.isDragging ? 4 : 3;
                
                for (let l = 0; l < layers; l++) {
                    // 内側から外側へ線を重ねる
                    const layerScale = 0.4 + (l * 0.3); 
                    ctx.lineWidth = this.isDragging ? 3 - (l * 0.5) : 2 - (l * 0.5);
                    
                    // ドラッグ中、または音が大きい時は線を不透明に輝かせる
                    const alpha = this.isDragging ? (1.0 - l * 0.2) : (0.4 + volume * 0.6 - (l * 0.1));
                    ctx.strokeStyle = this.colorBase + alpha + ')';
                    
                    // 発光（グローエフェクト）
                    ctx.shadowColor = this.colorBase + '0.8)';
                    ctx.shadowBlur = this.isDragging ? 15 : 6;

                    ctx.beginPath();
                    for (let i = 0; i < this.points; i++) {
                        const angle = (Math.PI * 2 / this.points) * i;
                        
                        // 音波（オーディオ波形）のようなランダムでリアルタイムなうねりを生成
                        const wave = Math.sin(this.noiseOffsets[i]) * (this.size * 0.15 * (volume + 0.2));
                        const r = (this.size * layerScale) + wave;
                        
                        const px = Math.cos(angle) * r;
                        const py = Math.sin(angle) * r;
                        
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        // --- オーディオコア処理 ---
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        audioFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            initAudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const fileURL = URL.createObjectURL(file);
            const audioEl = new Audio(fileURL);
            audioEl.loop = true;
            audioEl.crossOrigin = "anonymous";

            const sourceNode = audioCtx.createMediaElementSource(audioEl);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 32;
            
            sourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            const index = sounds.length;
            const newShape = new AudioWireframeShape(index);

            // UIオーブの生成
            const orb = document.createElement('div');
            orb.className = 'audio-orb';
            orb.innerText = index + 1;
            audioListContainer.appendChild(orb);

            const soundData = {
                audioEl: audioEl,
                analyser: analyser,
                dataArray: new Uint8Array(16),
                shape: newShape,
                isPlaying: false,
                orbEl: orb
            };
            sounds.push(soundData);

            orb.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (soundData.isPlaying) {
                    audioEl.pause();
                    orb.classList.remove('playing');
                    soundData.isPlaying = false;
                } else {
                    audioEl.play().catch(err => console.log(err));
                    orb.classList.add('playing');
                    soundData.isPlaying = true;
                }
            });

            // 自動再生
            audioEl.play().catch(err => console.log(err));
            orb.classList.add('playing');
            soundData.isPlaying = true;
            audioFileInput.value = '';
        });

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 深い闇の背景（0.15の透明度で、ワイヤーフレームの綺麗な残像・光の尾を引かせる）
            ctx.fillStyle = 'rgba(3, 5, 10, 0.18)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            sounds.forEach(sound => {
                let volume = 0;
                if (sound.isPlaying) {
                    sound.analyser.getByteFrequencyData(sound.dataArray);
                    let sum = 0;
                    for (let i = 0; i < sound.dataArray.length; i++) sum += sound.dataArray[i];
                    volume = (sum / sound.dataArray.length) / 255;
                }

                sound.shape.update(volume);
                sound.shape.draw(volume);
            });
        }
        animate();

        // --- マウス / タッチ（ドラッグ・移動操作） ---
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            // マウスイベントかタッチイベントかを判定
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleStart(e) {
            initAudioContext();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            const pos = getMousePos(e);
            
            // 後ろに追加された（手前に表示されている）シェイプから順に判定
            for (let i = sounds.length - 1; i >= 0; i--) {
                const shape = sounds[i].shape;
                if (shape.isHit(pos.x, pos.y)) {
                    draggedShape = shape;
                    shape.isDragging = true;
                    shape.targetX = pos.x;
                    shape.targetY = pos.y;
                    break;
                }
            }
        }

        function handleMove(e) {
            if (!draggedShape) return;
            // スクロールなどの標準動作を防ぐ（スマホの画面固定用）
            if (e.cancelable) e.preventDefault(); 
            
            const pos = getMousePos(e);
            draggedShape.targetX = pos.x;
            draggedShape.targetY = pos.y;
        }

        function handleEnd() {
            if (draggedShape) {
                draggedShape.isDragging = false;
                draggedShape = null;
            }
        }

        // PC用のイベント
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        // スマホ（タッチ）用のイベント
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // --- モーダル（お中元）操作 ---
        giftBtn.addEventListener('click', () => {
            sounds.forEach(sound => {
                sound.audioEl.pause();
                sound.orbEl.classList.remove('playing');
                sound.isPlaying = false;
            });
            giftModal.style.display = 'flex';
        });

        closeModalBtn.addEventListener('click', () => {
            giftModal.style.display = 'none';
        });
    </script>
</body>
</html>
